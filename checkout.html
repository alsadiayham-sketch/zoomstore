<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom Store | إتمام الطلب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-page { min-height: 100vh; padding: 110px 20px 60px; }
        .checkout-container { max-width: 980px; margin: 0 auto; }
        .checkout-title { text-align: center; font-size: 2.2rem; font-weight: 900; margin-bottom: 10px; }
        .checkout-grid { display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 22px; }
        .checkout-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 24px; box-shadow: var(--shadow); }
        .checkout-card h3 { font-size: 1.2rem; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .checkout-item { display: flex; gap: 12px; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; margin-bottom: 10px; align-items: center; }
        .checkout-item img { width: 62px; height: 62px; object-fit: cover; border-radius: 14px; background: #111; }
        .checkout-item-info { flex: 1; }
        .checkout-item-info h4 { font-size: 0.95rem; margin-bottom: 3px; }
        .checkout-item-info .item-brand, .checkout-item-info .item-size { display: block; font-size: 0.82rem; color: var(--muted); }
        .checkout-item-qty { display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; }
        .checkout-item-qty button { width: 30px; height: 30px; border: none; background: transparent; color: var(--text); font-size: 1rem; cursor: pointer; }
        .checkout-item-qty span { min-width: 30px; text-align: center; font-weight: 800; }
        .checkout-item-price { font-weight: 800; color: var(--accent); min-width: 70px; text-align: center; }
        .checkout-item-remove { background: none; border: none; color: #fca5a5; font-size: 1.2rem; cursor: pointer; }
        .summary-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.96rem; }
        .summary-row.total { border-bottom: none; padding-top: 15px; font-size: 1.28rem; font-weight: 900; color: var(--accent); }
        .summary-row .label { color: var(--text-light); }
        .delivery-options, .region-options { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        .delivery-option, .region-option { display: flex; align-items: center; gap: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); border-radius: 16px; cursor: pointer; transition: var(--transition); }
        .delivery-option:hover, .delivery-option.selected, .region-option:hover, .region-option.selected { border-color: rgba(226,194,117,0.45); background: rgba(226,194,117,0.08); }
        .delivery-option .radio-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid rgba(226,194,117,0.35); display: flex; align-items: center; justify-content: center; transition: var(--transition); }
        .delivery-option.selected .radio-dot::after { content: ''; width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
        .delivery-option-info h4 { font-size: 0.95rem; }
        .delivery-option-info p, .region-cost { font-size: 0.82rem; color: var(--text-light); margin-top: 2px; }
        .region-option { justify-content: space-between; flex-direction: row; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 700; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); color: var(--text); font-family: inherit; font-size: 0.95rem; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: rgba(226,194,117,0.45); box-shadow: 0 0 0 4px rgba(226,194,117,0.08); }
        .btn-whatsapp-order { width: 100%; padding: 14px; background: linear-gradient(135deg, #25d366, #5cff8a); color: #07311a; border: none; border-radius: 16px; font-family: inherit; font-size: 1rem; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .btn-whatsapp-order:disabled { opacity: 0.7; cursor: wait; }
        .back-link { display: inline-block; margin-bottom: 22px; color: var(--accent); text-decoration: none; font-weight: 700; }
        .empty-checkout { text-align: center; padding: 60px; background: var(--card); border: 1px solid var(--border); border-radius: 24px; box-shadow: var(--shadow); }
        .empty-checkout span { font-size: 3rem; display: block; margin-bottom: 15px; }
        .empty-checkout p { color: var(--text-light); margin-bottom: 20px; }
        .empty-checkout a { display: inline-block; padding: 12px 28px; background: linear-gradient(135deg, var(--primary), var(--accent)); color: #241607; text-decoration: none; border-radius: 999px; font-weight: 800; }
        .checkout-status { text-align: center; margin-bottom: 18px; color: var(--text-light); font-weight: 700; }
        .checkout-status.error { color: #fecaca; }
        @media (max-width: 820px) { .checkout-grid { grid-template-columns: 1fr; } .checkout-page { padding: 90px 14px 40px; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container" style="justify-content: space-between;">
            <a href="index.html" class="logo"><img src="logo.png" alt="Zoom Store" class="logo-img"><span class="logo-text" style="font-size:1rem;">Zoom Store</span></a>
            <a href="index.html" style="color: var(--accent); text-decoration: none; font-weight: 700; font-size: 0.95rem; white-space: nowrap;">← الرئيسية</a>
        </div>
    </nav>

    <div class="checkout-page">
        <div class="checkout-container">
            <a href="index.html" class="back-link">→ العودة للتسوق</a>
            <h1 class="checkout-title">إتمام الطلب</h1>
            <p class="checkout-status" id="checkoutStatus">جاري تحميل بيانات الطلب...</p>
            <div id="checkoutContent"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="data.js"></script>
    <script>
        const FALLBACK_IMAGE = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%231e1e30'/%3E%3Cpath d='M60 18c-14 4-24 17-24 32 0 19 15 34 34 34 4 0 8-.6 11-2-5 8-15 13-26 13-17 0-31-14-31-31 0-20 18-38 36-46z' fill='%23c9a96e'/%3E%3C/svg%3E";
        let products = normalizeProducts(DEFAULT_PRODUCTS);
        let discounts = normalizeDiscounts(DEFAULT_DISCOUNTS);
        let siteSettings = normalizeSettings(DEFAULT_SITE_SETTINGS);
        let cart = normalizeCartItems(JSON.parse(localStorage.getItem('zoom_cart') || '[]'), products);
        let selectedDelivery = localStorage.getItem('zoom_delivery_method') || 'pickup';
        let selectedRegion = '';

        const DELIVERY_COSTS = { westbank: 20, jerusalem: 30, inside: 50 };
        const DELIVERY_LABELS = { westbank: 'الضفة', jerusalem: 'القدس', inside: 'الداخل' };

        document.addEventListener('DOMContentLoaded', initializeCheckout);

        async function initializeCheckout() {
            cart = normalizeCartItems(JSON.parse(localStorage.getItem('zoom_cart') || '[]'), products);
            saveCart();
            render();
            setStatus('');
            if (window.db) {
                try {
                    const [productsSnap, discountsSnap, settingsSnap] = await Promise.all([
                        db.collection('products').get(),
                        db.collection('discounts').get(),
                        db.collection('settings').doc('config').get()
                    ]);
                    if (!productsSnap.empty) products = productsSnap.docs.map(function (docSnap) { return normalizeProduct(docSnap.data()); }).sort(function (a, b) { return a.id - b.id; });
                    discounts = discountsSnap.docs.map(function (docSnap) { return normalizeDiscount(docSnap.data()); });
                    siteSettings = normalizeSettings(settingsSnap.exists ? settingsSnap.data() : DEFAULT_SITE_SETTINGS);
                    cart = normalizeCartItems(JSON.parse(localStorage.getItem('zoom_cart') || '[]'), products);
                    saveCart();
                    render();
                } catch (error) {
                    console.error('Firestore fetch error:', error);
                }
            }
        }

        function setStatus(message, type) {
            const status = document.getElementById('checkoutStatus');
            if (!status) return;
            status.textContent = message;
            status.className = 'checkout-status' + (type ? ' ' + type : '');
            status.style.display = message ? 'block' : 'none';
        }

        function render() {
            const container = document.getElementById('checkoutContent');
            if (cart.length === 0) {
                container.innerHTML = '<div class="empty-checkout"><span>🛒</span><p>السلة فارغة! أضيفي منتجات أولاً</p><a href="index.html">ابدئي التسوق</a></div>';
                return;
            }
            const itemsHTML = cart.map(function (item) {
                const product = products.find(function (entry) { return entry.id === item.id; });
                if (!product) return '';
                const sizeData = getSizeData(product, item.sizeIdx);
                const pricing = getFinalPrice(product, item.sizeIdx, discounts);
                const lineTotal = pricing.final * item.qty;
                return '<div class="checkout-item"><img src="' + product.image + '" alt="' + product.name + '" onerror="this.src=\'' + FALLBACK_IMAGE + '\'"><div class="checkout-item-info"><h4>' + product.name + '</h4><span class="item-brand">' + product.brand + '</span><span class="item-size">' + getSizeLabel(sizeData) + '</span></div><div class="checkout-item-qty"><button onclick="changeQty(' + item.id + ', ' + item.sizeIdx + ', -1)">−</button><span>' + item.qty + '</span><button onclick="changeQty(' + item.id + ', ' + item.sizeIdx + ', 1)">+</button></div><div class="checkout-item-price">' + formatCurrency(lineTotal) + '</div><button class="checkout-item-remove" onclick="removeItem(' + item.id + ', ' + item.sizeIdx + ')">✕</button></div>';
            }).join('');
            const subtotal = getSubtotal();
            const itemCount = cart.reduce(function (sum, item) { return sum + item.qty; }, 0);
            container.innerHTML = `
                <div class="checkout-grid">
                    <div>
                        <div class="checkout-card">
                            <h3>المنتجات (${itemCount} قطعة)</h3>
                            ${itemsHTML}
                        </div>
                        <div class="checkout-card" style="margin-top:20px;">
                            <h3>طريقة الاستلام</h3>
                            <div class="delivery-options">
                                <div class="delivery-option ${selectedDelivery === 'pickup' ? 'selected' : ''}" onclick="selectDelivery('pickup')">
                                    <div class="radio-dot"></div>
                                    <div class="delivery-option-info">
                                        <h4>استلام مجاني من المعرض</h4>
                                        <p>استلمي طلبكِ بترتيب مسبق بدون أي تكلفة إضافية</p>
                                    </div>
                                </div>
                                <div class="delivery-option ${selectedDelivery === 'delivery' ? 'selected' : ''}" onclick="selectDelivery('delivery')">
                                    <div class="radio-dot"></div>
                                    <div class="delivery-option-info">
                                        <h4>توصيل للعنوان</h4>
                                        <p>توصيل إلى الضفة والقدس والداخل حسب المنطقة المختارة</p>
                                    </div>
                                </div>
                            </div>
                            ${selectedDelivery === 'delivery' ? `
                                <div class="delivery-regions" style="margin-top:15px;">
                                    <h4 style="margin-bottom:10px; font-size:0.95rem;">اختاري المنطقة:</h4>
                                    <div class="region-options">
                                        <div class="region-option ${selectedRegion === 'westbank' ? 'selected' : ''}" onclick="selectRegion('westbank')"><span>الضفة</span><span class="region-cost">₪20</span></div>
                                        <div class="region-option ${selectedRegion === 'jerusalem' ? 'selected' : ''}" onclick="selectRegion('jerusalem')"><span>القدس</span><span class="region-cost">₪30</span></div>
                                        <div class="region-option ${selectedRegion === 'inside' ? 'selected' : ''}" onclick="selectRegion('inside')"><span>الداخل</span><span class="region-cost">₪50</span></div>
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                        <div class="checkout-card" style="margin-top:20px;">
                            <h3>معلومات التواصل</h3>
                            <div class="form-group"><label>الاسم</label><input type="text" id="custName" placeholder="اسمك الكريم" required></div>
                            <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="custPhone" placeholder="05xxxxxxxx" pattern="[0-9]*" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')"></div>
                            <div class="form-group" id="addressGroup" style="${selectedDelivery === 'pickup' ? 'display:none' : ''}"><label>العنوان (المدينة + تفاصيل)</label><textarea id="custAddress" rows="2" placeholder="المدينة، الحي، الشارع..."></textarea></div>
                            <div class="form-group"><label>ملاحظات إضافية (اختياري)</label><textarea id="custNotes" rows="2" placeholder="أي ملاحظات على الطلب..."></textarea></div>
                        </div>
                    </div>
                    <div>
                        <div class="checkout-card" style="position:sticky; top:90px;">
                            <h3>ملخص الطلب</h3>
                            <div class="summary-row"><span class="label">عدد المنتجات:</span><span>${itemCount} قطعة</span></div>
                            <div class="summary-row"><span class="label">المجموع الفرعي:</span><span>${formatCurrency(subtotal)}</span></div>
                            <div class="summary-row"><span class="label">التوصيل:</span><span>${getDeliveryCostLabel()}</span></div>
                            <div class="summary-row total"><span>المجموع:</span><span>${formatCurrency(getTotal())}</span></div>
                            <button type="button" class="btn-whatsapp-order" id="confirmOrderBtn" onclick="confirmOrder()">تأكيد الطلب عبر واتساب</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function getSubtotal() {
            return cart.reduce(function (sum, item) {
                const product = products.find(function (entry) { return entry.id === item.id; });
                return product ? sum + getFinalPrice(product, item.sizeIdx, discounts).final * item.qty : sum;
            }, 0);
        }

        function changeQty(productId, sizeIdx, delta) {
            const item = cart.find(function (entry) { return entry.id === productId && entry.sizeIdx === sizeIdx; });
            if (!item) return;
            item.qty += delta;
            if (item.qty < 1) return removeItem(productId, sizeIdx);
            saveCart();
            render();
        }

        function removeItem(productId, sizeIdx) {
            cart = cart.filter(function (entry) { return !(entry.id === productId && entry.sizeIdx === sizeIdx); });
            saveCart();
            render();
        }

        function saveCart() {
            localStorage.setItem('zoom_cart', JSON.stringify(normalizeCartItems(cart, products)));
        }

        function selectDelivery(method) {
            var formData = getFormValues();
            selectedDelivery = method;
            if (method === 'pickup') selectedRegion = '';
            localStorage.setItem('zoom_delivery_method', method);
            render();
            restoreFormValues(formData);
        }

        function selectRegion(region) {
            var formData = getFormValues();
            selectedRegion = region;
            render();
            restoreFormValues(formData);
        }

        function getFormValues() {
            return {
                name: (document.getElementById('custName') || {}).value || '',
                phone: (document.getElementById('custPhone') || {}).value || '',
                address: (document.getElementById('custAddress') || {}).value || '',
                notes: (document.getElementById('custNotes') || {}).value || ''
            };
        }

        function restoreFormValues(data) {
            var name = document.getElementById('custName');
            var phone = document.getElementById('custPhone');
            var address = document.getElementById('custAddress');
            var notes = document.getElementById('custNotes');
            if (name) name.value = data.name;
            if (phone) phone.value = data.phone;
            if (address) address.value = data.address;
            if (notes) notes.value = data.notes;
        }

        function getDeliveryCost() {
            return selectedDelivery === 'pickup' ? 0 : (DELIVERY_COSTS[selectedRegion] || 0);
        }

        function getDeliveryCostLabel() {
            if (selectedDelivery === 'pickup') return 'مجاني (استلام)';
            if (!selectedRegion) return 'اختاري المنطقة';
            return formatCurrency(getDeliveryCost()) + ' (' + DELIVERY_LABELS[selectedRegion] + ')';
        }

        function getTotal() {
            return getSubtotal() + getDeliveryCost();
        }

        function buildOrder() {
            const customerName = document.getElementById('custName').value.trim();
            const customerPhone = document.getElementById('custPhone').value.trim();
            const address = document.getElementById('custAddress') ? document.getElementById('custAddress').value.trim() : '';
            const notes = document.getElementById('custNotes').value.trim();
            const subtotal = getSubtotal();
            const deliveryCost = getDeliveryCost();
            const total = subtotal + deliveryCost;
            const id = makeOrderId();
            return {
                id: id,
                items: cart.map(function (item) {
                    const product = products.find(function (entry) { return entry.id === item.id; });
                    const sizeData = getSizeData(product, item.sizeIdx);
                    const pricing = getFinalPrice(product, item.sizeIdx, discounts);
                    return {
                        productId: product.id,
                        name: product.name,
                        brand: product.brand,
                        sizeIdx: item.sizeIdx,
                        sizeLabel: getSizeLabel(sizeData),
                        qty: item.qty,
                        price: pricing.final,
                        lineTotal: pricing.final * item.qty
                    };
                }),
                customerName: customerName,
                customerPhone: customerPhone,
                address: address,
                notes: notes,
                delivery: selectedDelivery,
                region: selectedDelivery === 'delivery' ? selectedRegion : 'pickup',
                deliveryCost: deliveryCost,
                subtotal: subtotal,
                total: total,
                date: new Date().toISOString(),
                status: 'new'
            };
        }

        function buildWhatsAppMessage(order) {
            const itemsText = order.items.map(function (item, index) {
                return (index + 1) + '. ' + item.name + ' (' + item.sizeLabel + ')\n   السعر: ' + item.price + ' شيكل × ' + item.qty + ' = ' + item.lineTotal + ' شيكل';
            }).join('\n');
            const shippingText = order.delivery === 'pickup' ? 'مجاني (استلام من المعرض)' : formatCurrency(order.deliveryCost) + ' (' + DELIVERY_LABELS[order.region] + ')';
            const deliveryLabel = order.delivery === 'pickup' ? 'استلام من المعرض' : 'توصيل إلى ' + DELIVERY_LABELS[order.region] + ': ' + order.address;
            let msg = 'مرحبا، طلب جديد من Zoom Store (' + order.id + '):\n';
            msg += 'ـــــــــــــــــــــــــــ\n';
            msg += 'الاسم: ' + order.customerName + '\n';
            msg += 'الهاتف: ' + order.customerPhone + '\n';
            msg += 'ـــــــــــــــــــــــــــ\n';
            msg += 'المنتجات:\n\n' + itemsText + '\n';
            msg += 'ـــــــــــــــــــــــــــ\n';
            msg += 'المجموع: ' + order.subtotal + ' شيكل\n';
            msg += 'الشحن: ' + shippingText + '\n';
            msg += 'الإجمالي النهائي: ' + order.total + ' شيكل\n';
            msg += 'ـــــــــــــــــــــــــــ\n';
            msg += 'الاستلام: ' + deliveryLabel + '\n';
            if (order.notes) msg += 'ملاحظات: ' + order.notes + '\n';
            return msg;
        }

        async function confirmOrder() {
            const customerName = document.getElementById('custName').value.trim();
            const customerPhone = document.getElementById('custPhone').value.trim();
            if (!customerName || !customerPhone) return alert('الرجاء إدخال الاسم ورقم الهاتف');
            if (customerPhone.length < 9 || customerPhone.length > 14) return alert('رقم الهاتف غير صحيح');
            if (selectedDelivery === 'delivery') {
                if (!selectedRegion) return alert('الرجاء اختيار المنطقة');
                const address = document.getElementById('custAddress').value.trim();
                if (!address) return alert('الرجاء إدخال عنوان التوصيل');
            }
            const button = document.getElementById('confirmOrderBtn');
            const originalText = button.textContent;
            button.disabled = true;
            button.textContent = 'جاري حفظ الطلب...';
            try {
                const order = buildOrder();
                if (window.db) await db.collection('orders').doc(order.id).set(order);
                localStorage.setItem('zoom_last_order', JSON.stringify(order));
                localStorage.setItem('zoom_cart', '[]');
                const whatsappUrl = buildWhatsAppUrl(siteSettings.whatsappNumber, buildWhatsAppMessage(order));
                window.location.href = whatsappUrl;
            } catch (error) {
                console.error(error);
                alert('تعذر حفظ الطلب حالياً، حاولي مرة أخرى.');
                button.disabled = false;
                button.textContent = originalText;
            }
        }
    </script>
</body>
</html>
